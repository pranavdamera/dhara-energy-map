services:
  db:
    image: postgis/postgis:16-3.4
    container_name: dhara_postgis
    environment:
      POSTGRES_DB: dhara
      POSTGRES_USER: dhara_user
      POSTGRES_PASSWORD: dhara_pass
    ports:
      - "5433:5432"
    volumes:
      - dhara_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dhara_redis
    ports:
      - "6380:6379"

volumes:
  dhara_pgdata: